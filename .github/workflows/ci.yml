name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gdscript:
    name: Validate GDScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install gdtoolkit
        run: pip install "gdtoolkit==4.*"

      - name: Parse-check all GDScript
        run: find addons -name '*.gd' -print0 | xargs -0 -r gdparse
